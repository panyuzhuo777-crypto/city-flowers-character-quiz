<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>城市里应该有鲜花｜角色心测</title>
    <link rel="icon" href="assets/title-art.png" type="image/png" />
    <link rel="stylesheet" href="styles.css?v=20260715-2" />
  </head>
  <body>
    <audio id="bgm" src="assets/audio/city-flowers-bgm.mp3" loop preload="auto"></audio>
    <button
      class="audio-toggle is-playing"
      id="audioToggle"
      type="button"
      aria-label="背景音樂目前開啟，點擊關閉"
      aria-pressed="true"
    >
      <span aria-hidden="true">♪</span>
      <span id="audioToggleLabel">BGM ON</span>
    </button>

    <div class="scene" aria-hidden="true"></div>

    <main class="app" id="app">
      <section class="screen intro-screen" id="introScreen">
        <div class="intro-copy">
          <img
            class="title-art"
            src="assets/title-art.png"
            alt="暮春秋色系列，城市里应该有鲜花。即使被人摘掉，鲜花也应该长出来。"
          />
        </div>

        <div class="quiz-surface intro-surface">
          <div class="surface-head">
            <span>角色心测</span>
            <span>YOUTH · ROCK · FLOWERS</span>
          </div>

          <div class="field">
            <div class="field-label">角色范围</div>
            <div class="segmented" role="radiogroup" aria-label="角色范围">
              <button class="segment is-active" type="button" data-preference="all">全部</button>
              <button class="segment" type="button" data-preference="male">男角色</button>
              <button class="segment" type="button" data-preference="female">女角色</button>
            </div>
          </div>

          <button class="primary-action" id="startButton" type="button">
            开始心测
          </button>
        </div>
      </section>

      <section class="screen quiz-screen is-hidden" id="quizScreen" aria-live="polite">
        <div class="quiz-surface">
          <div class="quiz-topline">
            <div>
              <p class="eyebrow compact" id="questionKicker">校园</p>
              <div class="step-count"><span id="currentStep">01</span> / <span id="totalSteps">10</span></div>
            </div>
            <button class="ghost-action" id="restartButton" type="button">重来</button>
          </div>

          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>

          <h2 id="questionTitle"></h2>
          <div class="options" id="options"></div>

          <div class="quiz-actions">
            <button class="secondary-action" id="prevButton" type="button">上一题</button>
            <button class="primary-action" id="nextButton" type="button">下一题</button>
          </div>
        </div>
      </section>

      <section class="screen result-screen is-hidden" id="resultScreen" aria-live="polite">
        <div class="quiz-surface result-surface">
          <div class="surface-head">
            <span>你的角色封面</span>
            <span>RESULT</span>
          </div>

          <div class="result-match" aria-label="角色匹配度">
            <span>角色匹配度</span>
            <strong id="resultMatch">--%</strong>
          </div>

          <figure class="role-poster">
            <img id="roleImage" alt="測驗結果角色封面" />
          </figure>

          <section class="other-matches" aria-labelledby="otherMatchesTitle">
            <div class="other-matches-title" id="otherMatchesTitle">其他角色匹配度</div>
            <div class="match-list" id="matchList"></div>
          </section>

          <div class="quiz-actions result-actions">
            <button class="secondary-action" id="againButton" type="button">再测一次</button>
            <a
              class="primary-action save-action"
              id="saveButton"
              href="#"
              download="city-flowers-character-cover.jpg"
            >保存封面</a>
          </div>
        </div>
      </section>
    </main>

    <script src="app.js?v=20260715-3"></script>
  </body>
</html>
